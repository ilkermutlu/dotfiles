env:
  TERM: xterm-256color
# Font
font:
  normal: 
    family: IBM Plex Mono
  bold: 
    family: IBM Plex Mono
    style: Bold
  italic: 
    family: IBM Plex Mono
    style: Italic 
  size: 14.0
  offset:
    x: 0
    y: 4

# Cursor
cursor:
  unfocused_hollow: true

# Colors (One Dark)
colors:
  # Default colors
  primary:
    background: '#21242A'
    foreground: '#D3D3D3'

  # Normal colors
  normal:
    black:   '0x1e2127'
    red:     '0xe06c75'
    green:   '0x98c379'
    yellow:  '0xd19a66'
    blue:    '0x61afef'
    magenta: '0xc678dd'
    cyan:    '0x56b6c2'
    white:   '0xabb2bf'

  # Bright colors
  bright:
    black:   '0x5c6370'
    red:     '0xe06c75'
    green:   '0x98c379'
    yellow:  '0xd19a66'
    blue:    '0x61afef'
    magenta: '0xc678dd'
    cyan:    '0x56b6c2'
    white:   '0xffffff'
key_bindings:
  - { key: Key3,     mods: Alt,     chars: "#"                        }
